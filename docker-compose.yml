version: '3.8'

services:
  jellyseerr-approved-ui:
    build: .
    container_name: jellyseerr-approved-ui
    ports:
      - "8000:8000"
    environment:
      - JELLYSEERR_URL=YOUR_JELLYSEERR_URL_HERE
      - JELLYSEERR_API_KEY=YOUR_API_KEY_HERE
      - ANIWORLD_URL=http://aniworld-downloader:8080
      - ANIWORLD_USERNAME=YOUR_USERNAME_HERE
      - ANIWORLD_PASSWORD=YOUR_PASSWORD_HERE
      - SETTINGS_FILE=/app/data/settings.json
      - ANIME_MOVIE_PATH=/path/to/anime/movies
      - POLLING_INTERVAL=60
    volumes:
      - ./data:/app/data
    restart: unless-stopped
